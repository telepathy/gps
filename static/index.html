<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS - Global Publishing System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="nav">
        <div class="nav-brand">
            <span class="nav-logo">GPS</span>
            <span class="nav-title">Global Publishing System</span>
        </div>
